# ---------------------------------------------------------------------------
# MEMORY MODEL
# ---------------------------------------------------------------------------

memory_model:
  tier_1:
    scope: run_scoped
    persistence: must survive process restarts when approval gates are open
    data:
      trigger_event_payload: json
      run_state: enum
      all_timestamps: iso_8601
      extracted_capability_names: array_of_strings
      skill_1_output: markdown_and_json
      skill_2_output: markdown_and_json
      skill_3_output: markdown_and_json
      skill_4_output: markdown_and_json
      skill_5_output: markdown_and_json
      skill_6_output: markdown_and_json
      per_skill_gate_scores: json
      per_skill_firewall_reports: json
      approval_decisions: json
      assembly_status: json
      ag1_notes: string
      ag3_gap_revision_notes: string

  tier_2:
    scope: assessment_memory
    persistence: persistent across runs; indexed by client and run
    data:
      all_skill_outputs_per_run:
        retention: indefinite_until_superseded
        keys: [traceability_id, client_name, jurisdictions, target_framework]
      ams_ars_scores:
        retention: indefinite
        keys: [client_name, assessment_date]
      run_status:
        values: [complete, preliminary, superseded, halted]
        retention: indefinite
        keys: [traceability_id]
      capability_validation_results:
        retention: indefinite
        keys: [traceability_id, capability_name]
      subject_fingerprint:
        description: deduplication hash
        keys: [client_name, jurisdictions, target_framework]

  tier_3:
    scope: client_memory
    persistence: long-term; survives superseded assessments
    data:
      client_profile:
        fields: [sector, size, deployment_model, existing_tooling]
        retention: until_client_offboarded
      engagement_history:
        description: all traceability_id references for this client
        retention: 5_years
      ams_ars_progression:
        description: tracks certification readiness improvement over time
        retention: 5_years
      certification_classifications:
        description: all classifications with dates
        retention: 5_years
      approval_gate_history:
        description: all decisions and approvers
        retention: 7_years
      cpl_history:
        description: capability claims allowed at each assessment date
        retention: 5_years

  retention_constraints:
    prohibited:
      - PII about client employees beyond named RACI role owners
      - Confidential client data beyond trigger payload content
      - Intermediate outputs that did not pass quality gates
      - Approval decision reasoning beyond approver-recorded notes

# ---------------------------------------------------------------------------
# FAILURE HANDLING
# ---------------------------------------------------------------------------

failure_handling:
  retry_policy:
    auto_retry_allowed_for:
      - schema_validation_failure
    auto_retry_forbidden_for:
      - score_failures
      - claims_firewall_breaches
      - proposal_review_rejected_classification
      - approval_rejections
    max_retries: 1
    retry_strategy: augment_prompt_with_verbatim_error_messages

  halted_states_summary:
    intake:
      - HALTED_INTAKE_INVALID
      - HALTED_INTAKE_UNSUPPORTED_JURISDICTION
    skill_1:
      - HALTED_GATE_1_SCHEMA
      - HALTED_GATE_1_SCORE_PRELIMINARY
      - HALTED_GATE_1_SCORE_INSUFFICIENT
      - HALTED_APPROVAL_1_REJECTED
    skill_2:
      - HALTED_GATE_2_SCHEMA
      - HALTED_FIREWALL_BREACH_GCM
      - HALTED_GATE_2_SCORE_BELOW_THRESHOLD
      - HALTED_GATE_2_SCORE_INSUFFICIENT
    skill_3:
      - HALTED_GATE_3_SCHEMA
      - HALTED_FIREWALL_BREACH_SOLUTION
      - HALTED_GATE_3_SCORE_INSUFFICIENT
      - HALTED_APPROVAL_2_REJECTED
      - HALTED_APPROVAL_2_PARTIAL
    skill_4:
      - HALTED_GATE_4_SCHEMA
      - HALTED_FIREWALL_BREACH_ISO
      - HALTED_GATE_4_SCORE_BELOW_THRESHOLD
      - HALTED_GATE_4_SCORE_INSUFFICIENT
      - HALTED_APPROVAL_3_REJECTED
      - HALTED_APPROVAL_3_PARTIAL
    skill_5:
      - HALTED_GATE_5_SCHEMA
      - HALTED_FIREWALL_BREACH_CAPVAL
      - HALTED_GATE_5_SCORE_INSUFFICIENT
    skill_6:
      - HALTED_GATE_6_SCHEMA
      - HALTED_FIREWALL_BREACH_TERMINAL
      - HALTED_PROPOSAL_REJECTED
      - HALTED_PROPOSAL_CONDITIONAL
      - HALTED_APPROVAL_4_REJECTED
      - HALTED_APPROVAL_4_PARTIAL
    cross_cutting:
      - APPROVAL_TIMED_OUT
      - HALTED_ESCALATION

# ---------------------------------------------------------------------------
# ESCALATION ROUTING
# ---------------------------------------------------------------------------

escalation_routing:
  automatic:
    - condition: any_claims_firewall_breach
      target: Compliance Director
      payload: [capability_name, canonical_model_entry, offending_text, traceability_id]

    - condition: unsupported_jurisdiction
      target: [requesting_team, Compliance Analyst]

    - condition: any_skill_score < 55
      target: Compliance Analyst
      payload: per_dimension_score_breakdown

    - condition: any_capval_ecs < 45 or escalation_required == true
      target: [Compliance Director, Product team]

    - condition: proposal_review == Rejected
      target: [Compliance Director, Sales Director]

    - condition: ambiguous_eu_ai_act_annex_iii_classification
      target: General Counsel
      mechanism: run_log_flag

  human_authorised:
    - condition: ag2_conflict_one_approve_one_reject
      target: [both_approvers, Compliance Analyst]
      requires: conflict_resolution_meeting

    - condition: ag3_conflict
      target: [Client Risk Committee Lead, both_approvers, Compliance Analyst]

    - condition: ag4_conflict
      target: [Compliance Director, Sales Director, Compliance Analyst]
      requires: executive_sign_off

    - condition: approval_gate_timeout
      target: Compliance Analyst
      options: [extend_deadline, initiate_revised_run]

    - condition: proposal_review_conditional_elevate_to_delivery
      target: Compliance Director
      requires: manual_attestation_of_each_conditional_item

# ---------------------------------------------------------------------------
# SCORECARD COMPILER SPECIFICATION
# (scorecard_compiler.py must be implemented per this spec before L4A)
# ---------------------------------------------------------------------------

scorecard_compiler:
  input:
    - run_memory.skill_1_output (json)
    - run_memory.skill_2_output (json)
    - run_memory.skill_3_output (json)
    - run_memory.skill_4_output (json)
    - run_memory.skill_5_output (json)
    - run_memory.skill_6_output (json)
    - run_memory.all_approval_decisions (json)

  output: "{traceability_id}-client-scorecard.json"

  fields:
    traceability_id: from run state
    client_name: from trigger payload
    assessment_date: iso_8601
    regulatory_assessment:
      score: from skill_1_output gate score
      jurisdictions: from skill_1_output
      risk_tier: from skill_1_output Section 1
    control_assessment:
      score: from skill_2_output gate score
      control_count: count of controls in GCM Section 3
      orphan_controls: count of controls with no RACI owner
    platform_coverage:
      ccs_average: average CCS from skill_3_output Section 2
      production_coverage_percent: percent of requirements at CCS ≥ 70
      commercial_motion: from skill_3_output Section 2
    iso42001_assessment:
      ams: from skill_4_output
      ars: from skill_4_output
      certification_classification: from skill_4_output
      critical_gaps: count from gap register
      major_gaps: count from gap register
    capability_validation:
      capabilities_validated: count of all validations run
      all_production_confirmed: all validated_status == Production
      escalations_required: count of escalation_required == true
    proposal_review:
      pcs: from skill_6_output
      ctcs: from skill_6_output
      release_classification: from skill_6_output
      claims_firewall_status: confirmed_pass
    overall_readiness_band:
      computed_from: ams + platform_coverage + proposal_review release_classification
      values:
        - Certification Ready (AMS ≥ 80, PCS ≥ 90)
        - Assessment Complete — Gaps Identified (AMS 60–79, PCS ≥ 80)
        - Foundation Building (AMS < 60, PCS ≥ 80)
        - Delivery Blocked (PCS < 80 or firewall_breach)

  status: STUB — implementation required before L4A
  blocker_id: B-01
